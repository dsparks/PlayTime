      {/* Controls */}
      <div className="btn-row" style={{ marginTop: 14 }}>
        {!running && !isFullTime && (
          <button className="btn primary large" onClick={handleStart}>
            {elapsedSec === 0 ? 'Start' : 'Resume'}
          </button>
        )}
        {running && (
          <button className="btn large" onClick={handlePause}>Pause</button>
        )}
        {!swapMode && !isFullTime && (
          <button className="btn" onClick={startSwap}>Manual sub</button>
        )}
      </div>
      <div className="small-action-row">
        <button className="btn ghost" onClick={() => setRosterOpen(true)}>Add/Remove player</button>
        <button className="btn ghost" onClick={handleReset}>Reset clock</button>
        <button className="btn ghost" onClick={handleExit}>Setup</button>
      </div>

      {/* Live totals */}
      <div className="totals live-totals">
        <div className="section-title" style={{ margin: 0 }}>Minutes played (live)</div>
        <div className="totals-grid">
          {Object.entries(liveTotals.field)
            .filter(([n]) => !removedPlayers.has(n))
            .sort((a, b) => (b[1] + (liveTotals.goalkeeper[b[0]] || 0)) - (a[1] + (liveTotals.goalkeeper[a[0]] || 0)))
            .map(([name, sec]) => (
              <div className="total-item" key={name}>
                <span className="name">{name}{removedPlayers.has(name) ? ' (out)' : ''}</span>
                <span className="mins">
                  {Math.floor(sec / 60)}m {Math.floor(sec % 60)}s
                  {liveTotals.goalkeeper[name] ? ` | ${Math.floor(liveTotals.goalkeeper[name] / 60)}m ${Math.floor(liveTotals.goalkeeper[name] % 60)}s GK` : ''}
                </span>
              </div>
            ))}
        </div>
      </div>

      <div className="totals live-totals">
        <div className="section-title" style={{ margin: 0 }}>Goals</div>
        <div className="totals-grid">
          {Object.entries(goalSummary.byPlayer)
            .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
            .map(([name, total]) => (
              <div className="total-item" key={name}>
                <span className="name">{name}</span>
                <span className="mins">{total}</span>
              </div>
            ))}
          {goalSummary.opponent > 0 && (
            <div className="total-item">
              <span className="name">Opponent</span>
              <span className="mins">{goalSummary.opponent}</span>
            </div>
          )}
          {goalEvents.length === 0 && (
            <div className="next-sub-empty" style={{ gridColumn: '1 / -1' }}>No goals recorded</div>
          )}
        </div>
        {goalEvents.length > 0 && (
          <div className="goal-log">
            {[...goalEvents].reverse().map(goal => (
              <div className="goal-log-item" key={goal.id}>
                <span><strong>{goal.scorer}</strong></span>
                <div className="goal-log-actions">
                  <span>{fmtTime(goal.timeSec)} | Stint {goal.stintIdx + 1}</span>
                  <button className="btn ghost" onClick={() => editGoal(goal.id)}>Edit</button>
                  <button className="btn ghost" onClick={() => deleteGoal(goal.id)}>Delete</button>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      <div className="footer-note">
        Wake Lock keeps the screen on while the game runs. If the screen does sleep,
        the clock will resync to the correct time when you wake it back up. Audio
        chimes only fire while the screen is on.
      </div>

      {/* Goal modal */}
      {goalOpen && (
        <div className="modal-backdrop" onClick={() => { setGoalOpen(false); setEditingGoalId(null); }}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>{editingGoalId ? 'Edit goal' : 'Goal scorer'}</h3>
            <p>{editingGoalId ? 'Choose the correct scorer.' : `Choose who scored at ${fmtTime(elapsedSec)}.`}</p>

            <div className="goal-picker">
              {goalPickerScorers.map(name => (
                <button className="btn" key={name} onClick={() => recordGoal(name)}>
                  {name}
                </button>
              ))}
              <button className="btn danger" onClick={() => recordGoal('Opponent')}>
                Opponent
              </button>
            </div>

            <button className="btn ghost full" onClick={() => { setGoalOpen(false); setEditingGoalId(null); }}>Cancel</button>
          </div>
        </div>
      )}

      {/* Roster modal */}
      {rosterOpen && (
        <div className="modal-backdrop" onClick={() => setRosterOpen(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Roster mid-game</h3>
            <p>Add a late-arriving player or remove someone for the rest of the game. The rotation replans from the current stint.</p>

            <div className="roster-add">
              <input
                type="text"
                placeholder="New player name"
                value={newRosterName}
                onChange={e => setNewRosterName(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && addRosterPlayer()}
              />
              <button className="btn primary" onClick={addRosterPlayer}>Add</button>
            </div>
            <div className="radio-row" style={{ marginTop: 10 }}>
              <label className={`radio-label ${newRosterMode === 'bench' ? 'checked' : ''}`}>
                <input
                  type="radio"
                  name="newRosterMode"
                  checked={newRosterMode === 'bench'}
                  onChange={() => setNewRosterMode('bench')}
                />
                Bench
              </label>
              <label className={`radio-label ${newRosterMode === 'now' ? 'checked' : ''}`}>
                <input
                  type="radio"
                  name="newRosterMode"
                  checked={newRosterMode === 'now'}
                  onChange={() => setNewRosterMode('now')}
                />
                Work in now
              </label>
            </div>
            {config.hasGoalkeeper && (
              <label className="toggle" style={{ marginTop: 10 }}>
                <input
                  type="checkbox"
                  checked={newRosterGkAllowed}
                  onChange={e => setNewRosterGkAllowed(e.target.checked)}
                />
                <span className="toggle-track" />
                <span className="toggle-label">Eligible for GK</span>
              </label>
            )}

            <div className="swap-section-label">Active players</div>
            <div className="roster-list">
              {[...getRotationPlayers(config), ...extraPlayers]
                .filter(p => !removedPlayers.has(p))
                .map(p => (
                  <span key={p} className="roster-chip">
                    {p}
                    <button onClick={() => removeRosterPlayer(p)} aria-label={`Remove ${p}`}>x</button>
                  </span>
                ))
              }
              {removedPlayers.size > 0 && (
                <>
                  {[...removedPlayers].map(p => (
                    <span key={p} className="roster-chip" style={{ opacity: 0.4, textDecoration: 'line-through' }}>{p}</span>
                  ))}
                </>
              )}
            </div>

            <button className="btn full" onClick={() => setRosterOpen(false)}>Done</button>
          </div>
        </div>
      )}
    </div>
  );
}

function getRotationPlayers(config) {
  return [...config.players];
}

// Rebuild the remaining plan after a live manual sub or roster change.
function replanFromStint({ rotation, fromIdx, newOnField, newOffField, K, allRotationPlayers, goalkeeperSchedule = [], totalStints }) {
  const past = rotation.stints.slice(0, fromIdx).map(s => ({ ...s, onField: [...s.onField], offField: [...s.offField], subOut: [...s.subOut], subIn: [...s.subIn] }));

  const stintsPlayed = {};
  const lastAnchored = {};
  const origOrder = {};
  allRotationPlayers.forEach((p, i) => {
    stintsPlayed[p] = 0;
    lastAnchored[p] = -1000;
    origOrder[p] = i;
  });
  past.forEach((s, i) => {
    s.onField.forEach(p => {
      if (stintsPlayed[p] !== undefined) stintsPlayed[p]++;
    });
  });

  const currentGoalkeeper = goalkeeperSchedule[fromIdx] || rotation.stints[fromIdx]?.goalkeeper || null;
  const previousGoalkeeper = fromIdx > 0 ? (goalkeeperSchedule[fromIdx - 1] || rotation.stints[fromIdx - 1]?.goalkeeper || null) : null;
  const restingGoalkeeper = previousGoalkeeper && previousGoalkeeper !== currentGoalkeeper
    ? previousGoalkeeper
    : null;
  if (currentGoalkeeper) {
    newOnField = newOnField.filter(p => p !== currentGoalkeeper);
    newOffField = newOffField.filter(p => p !== currentGoalkeeper);
  }
  if (restingGoalkeeper) {
    newOnField = newOnField.filter(p => p !== restingGoalkeeper);
    newOffField = newOffField.includes(restingGoalkeeper)
      ? newOffField
      : [...newOffField, restingGoalkeeper];
  }

  const prevOnField = fromIdx > 0 ? past[fromIdx - 1].onField : [];
  const subOut = prevOnField.filter(p => !newOnField.includes(p));
  const subIn = newOnField.filter(p => !prevOnField.includes(p));
  newOnField.forEach(p => {
    if (stintsPlayed[p] !== undefined) stintsPlayed[p]++;
  });

  const newStints = [...past, {
    idx: fromIdx,
    goalkeeper: currentGoalkeeper,
    onField: [...newOnField].sort((a, b) => (origOrder[a] ?? 999) - (origOrder[b] ?? 999)),
    offField: [...newOffField].sort((a, b) => (origOrder[a] ?? 999) - (origOrder[b] ?? 999)),
    subOut,
    subIn,
  }];

  let onField = [...newOnField];
  let bench = [...newOffField];

  for (let s = fromIdx + 1; s < totalStints; s++) {
    const goalkeeper = goalkeeperSchedule[s] || rotation.stints[s]?.goalkeeper || null;
    const previousGoalkeeper = goalkeeperSchedule[s - 1] || rotation.stints[s - 1]?.goalkeeper || null;
    const restingGoalkeeper = previousGoalkeeper && previousGoalkeeper !== goalkeeper
      ? previousGoalkeeper
      : null;
    const eligible = allRotationPlayers.filter(p => p !== goalkeeper && p !== restingGoalkeeper);
    onField = onField.filter(p => eligible.includes(p));
    bench = eligible.filter(p => !onField.includes(p));

    const N = eligible.length;
    if (N === 0 || K === 0) break;
    const effectiveK = Math.min(K, N);

    if (N <= effectiveK || bench.length === 0) {
      newStints.push({
        idx: s,
        goalkeeper,
        onField: [...onField].sort((a, b) => (origOrder[a] ?? 999) - (origOrder[b] ?? 999)),
        offField: [...bench, ...(restingGoalkeeper ? [restingGoalkeeper] : [])].sort((a, b) => (origOrder[a] ?? 999) - (origOrder[b] ?? 999)),
        subOut: [],
        subIn: [],
      });
      onField.forEach(p => { if (stintsPlayed[p] !== undefined) stintsPlayed[p]++; });
      continue;
    }

    const numAnchors = Math.max(0, 2 * effectiveK - N);
    const numSubs = effectiveK - numAnchors;

    const onFieldSorted = [...onField].sort((a, b) => {
      if (stintsPlayed[a] !== stintsPlayed[b]) return stintsPlayed[a] - stintsPlayed[b];
      if (lastAnchored[a] !== lastAnchored[b]) return lastAnchored[a] - lastAnchored[b];
      return (origOrder[a] ?? 999) - (origOrder[b] ?? 999);
    });
    const anchors = onFieldSorted.slice(0, numAnchors);
    anchors.forEach(p => lastAnchored[p] = s);
    const goingOff = onField.filter(p => !anchors.includes(p));

    const benchSorted = [...bench].sort((a, b) => {
      if (stintsPlayed[a] !== stintsPlayed[b]) return stintsPlayed[a] - stintsPlayed[b];
      return (origOrder[a] ?? 999) - (origOrder[b] ?? 999);
    });
    const comingOn = benchSorted.slice(0, numSubs);
    const stayingBench = benchSorted.slice(numSubs);

    const newOn = [...anchors, ...comingOn];
    const newOff = [...stayingBench, ...goingOff, ...(restingGoalkeeper ? [restingGoalkeeper] : [])];

    newOn.forEach(p => { if (stintsPlayed[p] !== undefined) stintsPlayed[p]++; });

    newStints.push({
      idx: s,
      goalkeeper,
      onField: [...newOn].sort((a, b) => (origOrder[a] ?? 999) - (origOrder[b] ?? 999)),
      offField: [...newOff].sort((a, b) => (origOrder[a] ?? 999) - (origOrder[b] ?? 999)),
      subOut: goingOff,
      subIn: comingOn,
    });

    onField = newOn;
    bench = newOff;
  }

  return { stints: newStints, totalsByPlayer: { ...stintsPlayed } };
}

// App shell and persistence
function App() {
  const [phase, setPhase] = useState('setup');
  const [config, setConfig] = useState({
    gameLength: 40,
    stintLength: 4,
    numOnField: 4,
    hasGoalkeeper: false,
    goalkeeperName: '',
    goalkeeperNames: [],
    goalkeeperBlockStints: 2,
    startingGoalkeeper: '',
    players: [],
    startersMode: 'random',
    chosenStarters: [],
  });
  const [rotation, setRotation] = useState(null);
  const [savedLive, setSavedLive] = useState(null);
  const [showOnboarding, setShowOnboarding] = useState(false);

  useEffect(() => {
    try {
      setShowOnboarding(localStorage.getItem(ONBOARDING_STORAGE_KEY) !== 'true');
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const saved = JSON.parse(raw);
        setConfig({
          gameLength: saved.gameLength ?? 40,
          stintLength: saved.stintLength ?? 4,
          numOnField: saved.numOnField ?? 4,
          hasGoalkeeper: saved.hasGoalkeeper ?? false,
          goalkeeperName: saved.goalkeeperName ?? '',
          goalkeeperNames: saved.goalkeeperNames ?? (saved.players ?? []),
          goalkeeperBlockStints: saved.goalkeeperBlockStints ?? 2,
          startingGoalkeeper: saved.startingGoalkeeper ?? '',
          players: saved.players ?? [],
          startersMode: saved.startersMode ?? 'random',
          chosenStarters: saved.chosenStarters ?? [],
        });
      }
      const liveRaw = localStorage.getItem(LIVE_STORAGE_KEY);
      if (liveRaw) {
        const live = JSON.parse(liveRaw);
        if (live?.config && live?.rotation) setSavedLive(live);
      }
    } catch (e) { /* ignore */ }
  }, []);

  const dismissOnboarding = () => {
    try { localStorage.setItem(ONBOARDING_STORAGE_KEY, 'true'); } catch (e) { /* ignore */ }
    setShowOnboarding(false);
  };

  useEffect(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
    } catch (e) { /* ignore */ }
  }, [config]);

  const handleGenerate = () => {
    try { localStorage.removeItem(LIVE_STORAGE_KEY); } catch (e) { /* ignore */ }
    setSavedLive(null);
    const numStints = Math.ceil(config.gameLength / config.stintLength);
    const rotPlayers = getRotationPlayers(config);
    const fieldK = config.hasGoalkeeper ? config.numOnField - 1 : config.numOnField;

    let orderedPlayers;
    const validChosen = config.chosenStarters.filter(p => rotPlayers.includes(p) && p !== config.startingGoalkeeper);
    if (config.startersMode === 'manual' && validChosen.length === fieldK) {
      const rest = shuffle(rotPlayers.filter(p => !validChosen.includes(p)));
      orderedPlayers = [...validChosen, ...rest];
    } else {
      orderedPlayers = shuffle(rotPlayers);
    }

    const goalkeeperSchedule = getGoalkeeperSchedule(config, numStints, validChosen);
    const r = computeRotationWithGoalkeepers(orderedPlayers, fieldK, numStints, goalkeeperSchedule);
    setRotation(r);
    setPhase('preview');
  };

  const resumeLiveGame = () => {
    if (!savedLive?.config || !savedLive?.rotation) return;
    setConfig(savedLive.config);
    setRotation(savedLive.rotation);
    setPhase('game');
  };

  const discardLiveGame = () => {
    if (!confirm('Discard the saved live game?')) return;
    try { localStorage.removeItem(LIVE_STORAGE_KEY); } catch (e) { /* ignore */ }
    setSavedLive(null);
  };

  const handleGameExit = () => {
    try {
      const liveRaw = localStorage.getItem(LIVE_STORAGE_KEY);
      setSavedLive(liveRaw ? JSON.parse(liveRaw) : null);
    } catch (e) { /* ignore */ }
    setPhase('setup');
  };

  const phaseLabel = { setup: 'Setup', preview: 'Plan', game: 'Game' }[phase];

  return (
    <div className="app">
      <div className="app-header">
        <h1><span className="accent" />PlayTime</h1>
        <div className="header-actions">
          <button className="btn ghost how-to-btn" onClick={() => setShowOnboarding(true)}>How to use</button>
          <span className="phase-label">{phaseLabel}</span>
        </div>
      </div>

      {showOnboarding && (
        <div className="modal-backdrop" onClick={dismissOnboarding}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Welcome to PlayTime</h3>
            <p>
              PlayTime helps coaches build a fair substitution plan, rotate goalkeepers, track game time, and record goals during the game.
            </p>
            <ul>
              <li>Add each player in the Roster section, then choose game length, stint length, and how many players are on the field.</li>
              <li>Turn on Include a goalkeeper if you want keeper rotations, then choose who is eligible and who starts in goal.</li>
              <li>Pick random or manual starters, generate the rotation, review the plan, and start the game clock.</li>
              <li>During the game, use Goal, Manual sub, Add/Remove player, and the time controls as needed.</li>
            </ul>
            <button className="btn primary full" onClick={dismissOnboarding}>Got it</button>
          </div>
        </div>
      )}

      {phase === 'setup' && (
        <>
          {savedLive && (
            <div className="recovery-panel">
              <div className="section-title" style={{ margin: 0 }}>Saved Live Game</div>
              <div className="help-note" style={{ marginTop: 10 }}>
                Resume the in-progress game at {fmtTime((savedLive.elapsedMs || 0) / 1000)} with {savedLive.goalEvents?.length || 0} goal{(savedLive.goalEvents?.length || 0) === 1 ? '' : 's'} recorded.
              </div>
              <div className="btn-row">
                <button className="btn primary" onClick={resumeLiveGame}>Resume game</button>
                <button className="btn ghost" onClick={discardLiveGame}>Discard</button>
              </div>
            </div>
          )}
          <SetupScreen
            config={config}
            setConfig={setConfig}
            onGenerate={handleGenerate}
          />
        </>
      )}
      {phase === 'preview' && rotation && (
        <PreviewScreen
          config={config}
          rotation={rotation}
          onStart={() => { setSavedLive(null); setPhase('game'); }}
          onBack={() => setPhase('setup')}
        />
      )}
      {phase === 'game' && rotation && (
        <GameScreen
          key={`${phase}-${config.gameLength}-${config.stintLength}-${config.goalkeeperBlockStints}-${savedLive?.savedAt || 'new'}`}
          config={config}
          initialRotation={rotation}
          initialLive={savedLive}
          onExit={handleGameExit}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
