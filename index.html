<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<title>PlayTime</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --bg-2: #161b22;
    --bg-3: #1f262e;
    --line: #2a323d;
    --text: #f0f6fc;
    --muted: #8b949e;
    --dim: #6e7681;
    --green: #3fb950;
    --green-2: #56d364;
    --green-bg: rgba(63, 185, 80, 0.12);
    --amber: #e3b341;
    --amber-bg: rgba(227, 179, 65, 0.12);
    --red: #f85149;
    --red-bg: rgba(248, 81, 73, 0.12);
    --blue: #58a6ff;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 16px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: contain;
    min-height: 100vh;
    min-height: 100dvh;
  }

  .display-font {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .mono-num {
    font-variant-numeric: tabular-nums;
    font-family: 'Oswald', sans-serif;
    letter-spacing: 0.04em;
  }

  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: 16px;
    padding-bottom: env(safe-area-inset-bottom, 16px);
    padding-top: max(16px, env(safe-area-inset-top, 16px));
  }

  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
    gap: 12px;
  }
  .app-header h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 18px;
    margin: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .app-header h1 .accent {
    width: 10px;
    height: 18px;
    background: var(--green);
    display: inline-block;
    border-radius: 1px;
    transform: skewX(-15deg);
  }
  .app-header .phase-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 600;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .how-to-btn {
    padding: 6px 9px;
    font-size: 11px;
    white-space: nowrap;
  }

  /* Buttons */
  .btn {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 15px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover { background: var(--bg-3); border-color: var(--dim); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.primary {
    background: var(--green);
    color: #02210a;
    border-color: var(--green);
  }
  .btn.primary:hover { background: var(--green-2); border-color: var(--green-2); }
  .btn.danger {
    background: transparent;
    color: var(--red);
    border-color: var(--red);
  }
  .btn.danger:hover { background: var(--red-bg); }
  .btn.ghost {
    background: transparent;
    border-color: var(--line);
    color: var(--muted);
  }
  .btn.large {
    font-size: 18px;
    padding: 16px 28px;
  }
  .btn.full { width: 100%; }
  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn-row > .btn { flex: 1; min-width: 0; }

  /* Form fields */
  .field {
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field input[type="number"], .field input[type="text"], .field select {
    width: 100%;
    background: var(--bg-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 4px;
    font-family: 'Manrope', sans-serif;
    font-size: 16px;
    transition: border-color 0.12s;
  }
  .field input:focus, .field select:focus {
    outline: none;
    border-color: var(--green);
  }
  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 480px) {
    .field-row { grid-template-columns: 1fr 1fr; }
    .field-row > .field:nth-child(3) { grid-column: span 2; }
  }

  /* Toggle */
  .toggle {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
    padding: 10px 0;
  }
  .toggle input { display: none; }
  .toggle-track {
    width: 44px;
    height: 24px;
    background: var(--bg-3);
    border: 1px solid var(--line);
    border-radius: 999px;
    position: relative;
    transition: background 0.18s;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 18px; height: 18px;
    background: var(--muted);
    border-radius: 50%;
    transition: transform 0.18s, background 0.18s;
  }
  .toggle input:checked + .toggle-track {
    background: var(--green-bg);
    border-color: var(--green);
  }
  .toggle input:checked + .toggle-track::after {
    transform: translateX(20px);
    background: var(--green);
  }
  .toggle-label {
    font-weight: 600;
    font-size: 15px;
  }

  /* Radio (starter mode) */
  .radio-row {
    display: flex;
    gap: 16px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .radio-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
    font-weight: 600;
    font-size: 14px;
    padding: 6px 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--bg-2);
    transition: border-color 0.12s, background 0.12s;
  }
  .radio-label.checked {
    border-color: var(--green);
    background: var(--green-bg);
    color: var(--green-2);
  }
  .radio-label input[type="radio"] {
    accent-color: var(--green);
    width: 16px;
    height: 16px;
    margin: 0;
  }
  .radio-label .count {
    font-family: 'Oswald', sans-serif;
    font-variant-numeric: tabular-nums;
    margin-left: 4px;
    color: var(--muted);
    font-weight: 600;
  }
  .radio-label.checked .count { color: var(--green-2); }

  /* Starter picker chips */
  .starter-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px;
    background: var(--bg-2);
    border: 1px dashed var(--line);
    border-radius: 4px;
    min-height: 40px;
  }
  .starter-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    transition: transform 0.1s, background 0.12s, border-color 0.12s;
    border: 1px solid var(--line);
    background: var(--bg-3);
    color: var(--muted);
  }
  .starter-chip:active { transform: scale(0.97); }
  .starter-chip.selected {
    background: var(--green-bg);
    border-color: var(--green);
    color: var(--green-2);
  }
  .starter-chip.gk-eligible.selected {
    background: var(--amber-bg);
    border-color: var(--amber);
    color: var(--amber);
  }
  .starter-chip.selected::before {
    content: '*';
    color: var(--green);
  }
  .starter-chip.gk-eligible.selected::before { content: none; }
  .starter-chip.disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .starter-chip button {
    background: none;
    border: none;
    color: currentColor;
    cursor: pointer;
    padding: 0;
    width: 18px;
    height: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    line-height: 1;
    opacity: 0.8;
  }

  /* Roster */
  .roster-add {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .roster-add input { flex: 1; }
  .roster-add .btn { padding: 12px 16px; }

  .roster-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
    min-height: 40px;
    padding: 12px;
    background: var(--bg-2);
    border: 1px dashed var(--line);
    border-radius: 4px;
  }
  .roster-list:empty::before {
    content: 'Add players above to build your roster';
    color: var(--dim);
    font-size: 14px;
    font-style: italic;
  }
  .roster-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-3);
    border: 1px solid var(--line);
    padding: 6px 10px 6px 12px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
  }
  .roster-chip.gk {
    background: var(--amber-bg);
    border-color: var(--amber);
    color: var(--amber);
  }
  .gk-tag {
    font-size: 9px;
    background: var(--amber);
    color: #1a1100;
    padding: 1px 4px;
    border-radius: 2px;
    margin-right: -2px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .roster-chip button {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 0;
    width: 18px; height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    line-height: 1;
  }
  .roster-chip button:hover { color: var(--red); }

  /* Section */
  .section {
    margin-bottom: 24px;
  }
  .section-title {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    font-size: 13px;
    letter-spacing: 0.14em;
    color: var(--muted);
    margin-bottom: 10px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before {
    content: '';
    width: 12px; height: 2px;
    background: var(--green);
    display: inline-block;
  }

  /* Rotation table */
  .rot-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .rot-stint {
    display: grid;
    grid-template-columns: 70px 1fr;
    gap: 12px;
    padding: 14px 0;
    border-top: 1px solid var(--line);
  }
  .rot-stint:first-child { border-top: none; }
  .rot-stint-time {
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--green);
  }
  .rot-stint-num {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.1em;
    margin-bottom: 2px;
    font-weight: 600;
  }
  .rot-stint-content { min-width: 0; }
  .rot-onfield {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
  }
  .player-pill {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    background: var(--green-bg);
    border: 1px solid var(--green);
    color: var(--green-2);
  }
  .player-pill.gk {
    background: var(--amber-bg);
    border-color: var(--amber);
    color: var(--amber);
  }
  .player-pill.off {
    background: transparent;
    border-color: var(--line);
    color: var(--muted);
  }
  .rot-subs {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    flex-wrap: wrap;
    gap: 4px 8px;
    align-items: center;
  }
  .rot-subs .out { color: var(--red); }
  .rot-subs .in { color: var(--green-2); }
  .rot-subs .arrow { color: var(--dim); }

  /* Totals */
  .totals {
    margin-top: 18px;
    padding: 14px;
    background: var(--bg-2);
    border-radius: 6px;
    border: 1px solid var(--line);
  }
  .totals-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px;
    margin-top: 10px;
  }
  .total-item {
    display: flex;
    justify-content: space-between;
    padding: 6px 10px;
    background: var(--bg-3);
    border-radius: 4px;
    font-size: 13px;
  }
  .total-item .name { font-weight: 600; }
  .total-item .mins { color: var(--green-2); font-family: 'Oswald', sans-serif; font-weight: 600; }
  .total-item.gk .mins { color: var(--amber); }
  .totals-note {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }

  /* Game screen */
  .game-screen {
    text-align: center;
  }
  .clock-main {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: clamp(72px, 22vw, 128px);
    line-height: 1;
    letter-spacing: 0.02em;
    font-variant-numeric: tabular-nums;
    color: var(--text);
    margin: 8px 0 0;
  }
  .clock-main.running { color: var(--green-2); }
  .clock-main.paused { color: var(--amber); }
  .clock-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    font-weight: 600;
  }
  .clock-stint {
    display: flex;
    justify-content: center;
    align-items: baseline;
    gap: 14px;
    margin-top: 8px;
    color: var(--muted);
  }
  .clock-stint .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; font-weight: 600; }
  .clock-stint .val { font-family: 'Oswald', sans-serif; font-size: 22px; font-variant-numeric: tabular-nums; color: var(--text); font-weight: 600; }

  .progress-bar {
    height: 4px;
    background: var(--bg-2);
    border-radius: 2px;
    margin: 12px 0;
    overflow: hidden;
    position: relative;
  }
  .progress-bar .fill {
    height: 100%;
    background: var(--green);
    transition: width 0.1s linear;
  }
  .progress-bar .halftime-tick {
    position: absolute;
    top: -2px; bottom: -2px;
    width: 2px;
    background: var(--amber);
    left: 50%;
  }
  .time-scrubber {
    margin: 10px 0 2px;
  }
  .time-scrubber input[type="range"] {
    width: 100%;
    accent-color: var(--green);
  }
  .time-scrubber-labels {
    display: flex;
    justify-content: space-between;
    color: var(--dim);
    font-size: 10px;
    font-family: 'Oswald', sans-serif;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }
  .time-jumps {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 6px;
    margin-top: 8px;
  }
  .time-jumps .btn {
    padding: 7px 8px;
    font-size: 11px;
    justify-content: center;
  }

  .game-status {
    display: inline-block;
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: 0.18em;
    padding: 4px 12px;
    border-radius: 999px;
    background: var(--green-bg);
    color: var(--green-2);
    border: 1px solid var(--green);
    font-weight: 600;
    margin-top: 8px;
  }
  .game-status.paused { background: var(--amber-bg); color: var(--amber); border-color: var(--amber); }
  .game-status.halftime { background: var(--amber-bg); color: var(--amber); border-color: var(--amber); }
  .game-status.fulltime { background: var(--red-bg); color: var(--red); border-color: var(--red); }

  .panel {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 14px;
    margin-top: 14px;
    text-align: left;
  }
  .panel-title {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: 0.14em;
    color: var(--muted);
    font-weight: 600;
    margin: 0 0 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-title .countdown {
    font-family: 'Oswald', sans-serif;
    color: var(--amber);
    font-size: 14px;
    font-variant-numeric: tabular-nums;
  }

  .now-on {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }
  .now-on .player-pill { font-size: 16px; padding: 8px 14px; }

  .next-sub {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 10px;
    align-items: center;
    margin-top: 10px;
  }
  .sub-side .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .sub-side.out .label { color: var(--red); }
  .sub-side.in .label { color: var(--green-2); }
  .sub-side .pills { display: flex; flex-wrap: wrap; gap: 4px; }
  .sub-side .pills .player-pill { font-size: 13px; padding: 4px 8px; }
  .sub-arrow {
    font-size: 24px;
    color: var(--dim);
  }

  .next-sub-empty {
    color: var(--dim);
    font-style: italic;
    text-align: center;
    padding: 10px;
    font-size: 14px;
  }

  /* Manual sub mode */
  .manual-instructions {
    background: var(--bg-3);
    padding: 10px 12px;
    border-radius: 4px;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 10px;
    border-left: 3px solid var(--blue);
  }
  .swap-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .swap-list .player-pill {
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .swap-list .player-pill.selected {
    box-shadow: 0 0 0 2px var(--blue);
    transform: scale(1.05);
  }
  .swap-section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    margin: 8px 0 6px;
    font-weight: 700;
  }

  /* Live totals */
  .live-totals {
    margin-top: 14px;
  }
  .live-totals .totals-grid { margin-top: 0; }

  .score-panel {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 10px;
    align-items: center;
    margin-top: 14px;
    padding: 12px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 6px;
  }
  .score-team {
    min-width: 0;
  }
  .score-team .label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 700;
  }
  .score-team .value {
    font-family: 'Oswald', sans-serif;
    font-size: 34px;
    line-height: 1;
    color: var(--text);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .score-divider {
    color: var(--dim);
    font-family: 'Oswald', sans-serif;
    font-size: 28px;
  }
  .goal-button {
    margin-top: 14px;
    font-size: 22px;
    letter-spacing: 0.12em;
  }
  .goal-picker {
    display: grid;
    gap: 8px;
    margin-bottom: 14px;
  }
  .goal-picker .btn {
    justify-content: center;
  }
  .goal-log {
    display: grid;
    gap: 6px;
    margin-top: 10px;
  }
  .goal-log-item {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 6px 8px;
    border-radius: 4px;
    background: var(--bg-3);
    font-size: 12px;
    color: var(--muted);
  }
  .goal-log-item strong { color: var(--text); }
  .goal-log-actions {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .goal-log-actions .btn {
    padding: 4px 7px;
    font-size: 10px;
  }
  .recovery-panel,
  .summary-panel {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .summary-score {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: center;
    margin: 10px 0 14px;
  }
  .summary-score .value {

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// Formatting helpers
const fmtTime = (totalSec) => {
  if (totalSec < 0) totalSec = 0;
  const m = Math.floor(totalSec / 60);
  const s = Math.floor(totalSec % 60);
  return `${m}:${String(s).padStart(2, '0')}`;
};

const fmtMinutes = (mins) => {
  if (!Number.isFinite(mins)) return '0';
  return Number.isInteger(mins) ? String(mins) : String(Math.round(mins * 100) / 100);
};

const shuffle = (arr) => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};

const STORAGE_KEY = 'soccer-rotation-v1';
const LIVE_STORAGE_KEY = 'playtime-live-game-v1';
const ONBOARDING_STORAGE_KEY = 'playtime-onboarding-seen-v1';

// Rotation planning
function computeRotation(playerNames, K, numStints) {
  const N = playerNames.length;
  if (N === 0 || K === 0 || numStints === 0) {
    return { stints: [], totalsByPlayer: {} };
  }
  if (N <= K) {
    const stints = [];
    for (let s = 0; s < numStints; s++) {
      stints.push({
        idx: s,
        onField: [...playerNames],
        offField: [],
        subOut: [],
        subIn: [],
      });
    }
    const totals = {};
    playerNames.forEach(p => totals[p] = numStints);
    return { stints, totalsByPlayer: totals };
  }

  const stintsPlayed = {};
  const lastAnchored = {};
  const origOrder = {};
  playerNames.forEach((p, i) => {
    stintsPlayed[p] = 0;
    lastAnchored[p] = -1000;
    origOrder[p] = i;
  });

  let onField = playerNames.slice(0, K);
  let bench = playerNames.slice(K);
  onField.forEach(p => stintsPlayed[p]++);

  const stints = [{
    idx: 0,
    onField: [...onField],
    offField: [...bench],
    subOut: [],
    subIn: [],
  }];

  for (let s = 1; s < numStints; s++) {
    const numAnchors = Math.max(0, 2 * K - N);
    const numSubs = K - numAnchors;

    const onFieldSorted = [...onField].sort((a, b) => {
      if (stintsPlayed[a] !== stintsPlayed[b]) return stintsPlayed[a] - stintsPlayed[b];
      if (lastAnchored[a] !== lastAnchored[b]) return lastAnchored[a] - lastAnchored[b];
      return origOrder[a] - origOrder[b];
    });
    const anchors = onFieldSorted.slice(0, numAnchors);
    anchors.forEach(p => lastAnchored[p] = s);
    const goingOff = onField.filter(p => !anchors.includes(p));

    const benchSorted = [...bench].sort((a, b) => {
      if (stintsPlayed[a] !== stintsPlayed[b]) return stintsPlayed[a] - stintsPlayed[b];
      return origOrder[a] - origOrder[b];
    });
    const comingOn = benchSorted.slice(0, numSubs);
    const stayingBench = benchSorted.slice(numSubs);

    const newOnField = [...anchors, ...comingOn];
    const newBench = [...stayingBench, ...goingOff];

    newOnField.forEach(p => stintsPlayed[p]++);

    stints.push({
      idx: s,
      onField: [...newOnField].sort((a, b) => origOrder[a] - origOrder[b]),
      offField: [...newBench].sort((a, b) => origOrder[a] - origOrder[b]),
      subOut: goingOff,
      subIn: comingOn,
    });

    onField = newOnField;
    bench = newBench;
  }

  return { stints, totalsByPlayer: { ...stintsPlayed } };
}

function getGoalkeeperPlayers(config) {
  if (!config.hasGoalkeeper) return [];
  const selected = config.goalkeeperNames || config.players;
  return config.players.filter(p => selected.includes(p));
}

function getGoalkeeperSchedule(config, numStints, avoidFirst = []) {
  if (!config.hasGoalkeeper) return Array(numStints).fill(null);
  let keepers = getGoalkeeperPlayers(config);
  if (keepers.length === 0) return Array(numStints).fill(null);

  const manualStarter = config.startersMode === 'manual' && config.startingGoalkeeper && keepers.includes(config.startingGoalkeeper)
    ? config.startingGoalkeeper
    : null;
  const firstPreferred = manualStarter || keepers.find(p => !avoidFirst.includes(p));
  if (firstPreferred) {
    keepers = [firstPreferred, ...keepers.filter(p => p !== firstPreferred)];
  }

  const blockStints = Math.max(1, parseInt(config.goalkeeperBlockStints, 10) || 1);
  return Array.from({ length: numStints }, (_, i) => keepers[Math.floor(i / blockStints) % keepers.length]);
}

function computeRotationWithGoalkeepers(playerNames, K, numStints, goalkeeperSchedule) {
  if (!goalkeeperSchedule || goalkeeperSchedule.every(gk => !gk)) {
    return computeRotation(playerNames, K, numStints);
  }

  const totals = {};
  const goalkeeperTotals = {};
  const lastAnchored = {};
  const origOrder = {};
  playerNames.forEach((p, i) => {
    totals[p] = 0;
    goalkeeperTotals[p] = 0;
    lastAnchored[p] = -1000;
    origOrder[p] = i;
  });

  const stints = [];
  let onField = [];
  let bench = [...playerNames];

  for (let s = 0; s < numStints; s++) {
    const goalkeeper = goalkeeperSchedule[s];
    const previousGoalkeeper = s > 0 ? goalkeeperSchedule[s - 1] : null;
    const restingGoalkeeper = previousGoalkeeper && previousGoalkeeper !== goalkeeper
      ? previousGoalkeeper
      : null;
    if (goalkeeper && goalkeeperTotals[goalkeeper] !== undefined) goalkeeperTotals[goalkeeper]++;

    const eligible = playerNames.filter(p => p !== goalkeeper && p !== restingGoalkeeper);
    onField = onField.filter(p => eligible.includes(p));
    bench = eligible.filter(p => !onField.includes(p));

    const effectiveK = Math.min(K, eligible.length);
    let newOn;
    let newOff;

    if (s === 0 || onField.length === 0) {
      newOn = eligible.slice(0, effectiveK);
      newOff = eligible.filter(p => !newOn.includes(p));
    } else if (eligible.length <= effectiveK) {
      newOn = [...eligible];
      newOff = [];
    } else {
      const N = eligible.length;
      const numAnchors = Math.max(0, 2 * effectiveK - N);
      const numSubs = effectiveK - numAnchors;
      const onFieldSorted = [...onField].sort((a, b) => {
        if (totals[a] !== totals[b]) return totals[a] - totals[b];
        if (lastAnchored[a] !== lastAnchored[b]) return lastAnchored[a] - lastAnchored[b];
        return (origOrder[a] ?? 999) - (origOrder[b] ?? 999);
      });
      const anchors = onFieldSorted.slice(0, numAnchors);
      anchors.forEach(p => lastAnchored[p] = s);
      const goingOff = onField.filter(p => !anchors.includes(p));
      const benchSorted = bench.sort((a, b) => {
        if (totals[a] !== totals[b]) return totals[a] - totals[b];
        return (origOrder[a] ?? 999) - (origOrder[b] ?? 999);
      });
      const comingOn = benchSorted.slice(0, numSubs);
      const stayingBench = benchSorted.slice(numSubs);
      newOn = [...anchors, ...comingOn];
      newOff = [...stayingBench, ...goingOff];
    }

    if (restingGoalkeeper) newOff = [...newOff, restingGoalkeeper];
    newOn.forEach(p => totals[p] = (totals[p] || 0) + 1);
    const prevOn = stints[s - 1]?.onField || [];
    stints.push({
      idx: s,
      goalkeeper,
      onField: [...newOn].sort((a, b) => (origOrder[a] ?? 999) - (origOrder[b] ?? 999)),
      offField: [...newOff].sort((a, b) => (origOrder[a] ?? 999) - (origOrder[b] ?? 999)),
      subOut: prevOn.filter(p => !newOn.includes(p)),
      subIn: newOn.filter(p => !prevOn.includes(p)),
    });
    onField = newOn;
    bench = newOff;
  }

  return { stints, totalsByPlayer: totals, goalkeeperTotals };
}

// Audio chimes
function makeChimer() {
  let ctx = null;
  const ensure = () => {
    if (!ctx) {
      try { ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { return null; }
    }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  };
  const beep = (freq, dur, delay = 0, type = 'sine', vol = 0.35) => {
    const c = ensure();
    if (!c) return;
    const start = c.currentTime + delay;
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    osc.connect(gain);
    gain.connect(c.destination);
    gain.gain.setValueAtTime(0, start);
    gain.gain.linearRampToValueAtTime(vol, start + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    osc.start(start);
    osc.stop(start + dur + 0.05);
  };
  return {
    unlock: () => { ensure(); },
    stintEnd: () => {
      beep(880, 0.18, 0, 'sine');
      beep(880, 0.18, 0.22, 'sine');
    },
    halftimeWarning: () => {
      beep(660, 0.14, 0, 'triangle');
      beep(660, 0.14, 0.2, 'triangle');
      beep(660, 0.14, 0.4, 'triangle');
    },
    halftime: () => {
      beep(523.25, 0.32, 0, 'sine', 0.4);   // C5
      beep(659.25, 0.32, 0.32, 'sine', 0.4); // E5
      beep(783.99, 0.55, 0.64, 'sine', 0.4); // G5
    },
    fullTime: () => {
      beep(523.25, 0.25, 0, 'sine', 0.4);
      beep(659.25, 0.25, 0.25, 'sine', 0.4);
      beep(783.99, 0.25, 0.5, 'sine', 0.4);
      beep(1046.5, 0.25, 0.75, 'sine', 0.4);
      beep(1046.5, 0.7, 1.05, 'sine', 0.4);
    },
  };
}

// Setup
function SetupScreen({ config, setConfig, onGenerate }) {
  const [newName, setNewName] = useState('');
  const inputRef = useRef(null);

  const addPlayer = () => {
    const trimmed = newName.trim();
    if (!trimmed) return;
    if (config.players.some(p => p.toLowerCase() === trimmed.toLowerCase())) return;
    setConfig({
      ...config,
      players: [...config.players, trimmed],
      goalkeeperNames: [...(config.goalkeeperNames || []), trimmed],
    });
    setNewName('');
    inputRef.current?.focus();
  };

  const removePlayer = (name) => {
    setConfig({
      ...config,
      players: config.players.filter(p => p !== name),
      goalkeeperName: config.goalkeeperName === name ? '' : config.goalkeeperName,
      goalkeeperNames: (config.goalkeeperNames || []).filter(p => p !== name),
      startingGoalkeeper: config.startingGoalkeeper === name ? '' : config.startingGoalkeeper,
      chosenStarters: config.chosenStarters.filter(p => p !== name),
    });
  };

  const toggleGoalkeeperAllowed = (name) => {
    const current = config.goalkeeperNames || config.players;
    const isAllowed = current.includes(name);
    setConfig({
      ...config,
      goalkeeperNames: isAllowed
        ? current.filter(p => p !== name)
        : [...current, name],
      startingGoalkeeper: isAllowed && config.startingGoalkeeper === name ? '' : config.startingGoalkeeper,
    });
  };

  const startersNeeded = config.hasGoalkeeper
    ? Math.max(0, config.numOnField - 1)
    : config.numOnField;

  const toggleStarter = (name) => {
    if (name === config.startingGoalkeeper) return;
    const isCurrent = config.chosenStarters.includes(name);
    const validChosenCount = config.chosenStarters.filter(p => config.players.includes(p) && p !== config.startingGoalkeeper).length;
    if (isCurrent) {
      setConfig({ ...config, chosenStarters: config.chosenStarters.filter(p => p !== name) });
    } else {
      if (validChosenCount >= startersNeeded) return;
      setConfig({ ...config, chosenStarters: [...config.chosenStarters, name] });
    }
  };

  const setStartingGoalkeeper = (name) => {
    setConfig({
      ...config,
      startingGoalkeeper: name,
      chosenStarters: config.chosenStarters.filter(p => p !== name),
    });
  };

  const setStartersMode = (mode) => {
    setConfig({ ...config, startersMode: mode });
  };

  const validation = useMemo(() => {
    const errors = [];
    if (config.gameLength <= 0) errors.push('Game length must be positive');
    if (config.stintLength <= 0) errors.push('Stint length must be positive');
    if (config.stintLength > config.gameLength) errors.push('Stint length cannot exceed game length');
    if (config.numOnField < 1) errors.push('At least 1 player on field');
    if (config.players.length === 0) errors.push('Add at least one player');

    const fieldRotation = config.hasGoalkeeper
      ? config.numOnField - 1
      : config.numOnField;
    const goalkeeperPlayers = getGoalkeeperPlayers(config);
    const needsKeeperRestSpot = config.hasGoalkeeper && goalkeeperPlayers.length > 1;
    const rotationPlayers = config.hasGoalkeeper
      ? Math.max(0, config.players.length - (needsKeeperRestSpot ? 2 : 1))
      : config.players.length;
    const minPlayers = fieldRotation + (config.hasGoalkeeper ? (needsKeeperRestSpot ? 2 : 1) : 0);

    if (config.hasGoalkeeper) {
      if (goalkeeperPlayers.length === 0) errors.push('Allow at least one goalkeeper');
      if (config.numOnField < 2) errors.push('Need >=2 on field if there is a GK');
      if ((config.goalkeeperBlockStints || 0) < 1) errors.push('GK block length must be at least 1 stint');
    }
    if (rotationPlayers < fieldRotation && config.players.length > 0) {
      errors.push(`Need at least ${minPlayers} players for ${config.numOnField} on field${needsKeeperRestSpot ? ' with a resting outgoing GK' : (config.hasGoalkeeper ? ' (incl. GK)' : '')}`);
    }
    if (config.startersMode === 'manual' && rotationPlayers >= fieldRotation && config.players.length > 0) {
      const validChosen = config.chosenStarters.filter(p => config.players.includes(p) && p !== config.startingGoalkeeper);
      if (config.hasGoalkeeper && !goalkeeperPlayers.includes(config.startingGoalkeeper)) {
        errors.push('Choose a starting goalkeeper');
      }
      if (validChosen.length !== startersNeeded) {
        errors.push(`Choose exactly ${startersNeeded} starter${startersNeeded === 1 ? '' : 's'} (${validChosen.length}/${startersNeeded} picked)`);
      }
    }
    return errors;
  }, [config, startersNeeded]);

  return (
    <div>
      <div className="section">
        <div className="section-title">Game Settings</div>
        <div className="field-row">
          <div className="field">
            <label>Game length (min)</label>
            <input
              type="number"
              inputMode="numeric"
              min="1"
              value={config.gameLength}
              onChange={e => setConfig({ ...config, gameLength: parseInt(e.target.value) || 0 })}
            />
          </div>
          <div className="field">
            <label>Stint length (min)</label>
            <input
              type="number"
              inputMode="decimal"
              min="0.1"
              step="any"
              value={config.stintLength}
              onChange={e => setConfig({ ...config, stintLength: parseFloat(e.target.value) || 0 })}
            />
          </div>
          <div className="field">
            <label>On field</label>
            <input
              type="number"
              inputMode="numeric"
              min="1"
              value={config.numOnField}
              onChange={e => setConfig({ ...config, numOnField: parseInt(e.target.value) || 0 })}
            />
          </div>
        </div>

      </div>

      <div className="section">
        <div className="section-title">Roster ({config.players.length})</div>
        <div className="roster-add">
          <input
            ref={inputRef}
            type="text"
            placeholder="Player name"
            value={newName}
            onChange={e => setNewName(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && addPlayer()}
          />
          <button className="btn primary" onClick={addPlayer}>Add</button>
        </div>
        <div className="roster-list">
          {config.players.map(p => {
            return (
              <span
                key={p}
                className="roster-chip"
              >
                {p}
                <button onClick={(e) => { e.stopPropagation(); removePlayer(p); }} aria-label={`Remove ${p} from roster`} title="Remove from roster">x</button>
              </span>
            );
          })}
        </div>
      </div>

      <div className="section">
        <label className="toggle">
          <input
            type="checkbox"
            checked={config.hasGoalkeeper}
            onChange={e => setConfig({
              ...config,
              hasGoalkeeper: e.target.checked,
              goalkeeperNames: (config.goalkeeperNames || []).length > 0 ? config.goalkeeperNames : config.players,
            })}
          />
          <span className="toggle-track" />
          <span className="toggle-label">Include a goalkeeper</span>
        </label>
        {config.hasGoalkeeper && (
          <div>
            <div className="help-note">
              Goalkeepers rotate in contiguous blocks. Field rotation uses
              {' '}{Math.max(0, config.numOnField - 1)} field positions while the current keeper is in goal.
            </div>
            <div className="field" style={{ marginTop: 10, maxWidth: 180 }}>
              <label>GK block (stints)</label>
              <input
                type="number"
                inputMode="numeric"
                min="1"
                value={config.goalkeeperBlockStints}
                onChange={e => setConfig({ ...config, goalkeeperBlockStints: parseInt(e.target.value, 10) || 1 })}
              />
            </div>
          </div>
        )}
      </div>

      {config.hasGoalkeeper && (
        <div className="section">
          <div className="section-title">Eligible Goalkeepers</div>
          <div className="starter-list">
              {config.players.map(p => {
                const isAllowed = (config.goalkeeperNames || config.players).includes(p);
                return (
                  <span
                    key={p}
                    className={`starter-chip gk-eligible ${isAllowed ? 'selected' : ''}`}
                    onClick={() => toggleGoalkeeperAllowed(p)}
                    title={isAllowed ? 'Remove from goalkeeper rotation' : 'Add to goalkeeper rotation'}
                  >
                    {isAllowed && <span className="gk-tag">GK</span>}
                    {p}
                    {isAllowed && <button onClick={(e) => { e.stopPropagation(); toggleGoalkeeperAllowed(p); }} aria-label={`Remove ${p} from goalkeeper rotation`}>x</button>}
                  </span>
                );
              })}
          </div>
        </div>
      )}


      {config.players.length > 0 && startersNeeded > 0 && (
        <div className="section">
          <div className="section-title">Starters</div>
          <div className="radio-row">
            <label className={`radio-label ${config.startersMode === 'random' ? 'checked' : ''}`}>
              <input
                type="radio"
                name="startersMode"
                checked={config.startersMode === 'random'}
                onChange={() => setStartersMode('random')}
              />
              Random
            </label>
            <label className={`radio-label ${config.startersMode === 'manual' ? 'checked' : ''}`}>
              <input
                type="radio"
                name="startersMode"
                checked={config.startersMode === 'manual'}
                onChange={() => setStartersMode('manual')}
              />
              Choose
              {config.startersMode === 'manual' && (
                <span className="count">
                  {config.chosenStarters.filter(p => config.players.includes(p) && p !== config.startingGoalkeeper).length}/{startersNeeded}
                  {config.hasGoalkeeper && (config.startingGoalkeeper ? ' + GK' : ' + no GK')}
                </span>
              )}
            </label>
          </div>
          {config.startersMode === 'manual' && (
            <>
              <div className="help-note">
                {config.hasGoalkeeper
                  ? <>Choose the starting goalkeeper and the {startersNeeded} {startersNeeded === 1 ? 'field player' : 'field players'} who will start.</>
                  : <>Tap to pick the {startersNeeded} {startersNeeded === 1 ? 'player' : 'players'} who will start on the field.</>}
              </div>
              {config.hasGoalkeeper && (
                <div className="swap-section-label">Starting field players</div>
              )}
              <div className="starter-list">
                {config.players.length === 0 && (
                  <span style={{ color: 'var(--dim)', fontSize: 13, fontStyle: 'italic' }}>Add players to the roster first</span>
                )}
                {config.players
                  .filter(p => p !== config.startingGoalkeeper)
                  .map(p => {
                    const isStarter = config.chosenStarters.includes(p);
                    const isFull = !isStarter && config.chosenStarters.filter(p => config.players.includes(p) && p !== config.startingGoalkeeper).length >= startersNeeded;
                    return (
                      <span
                        key={p}
                        className={`starter-chip ${isStarter ? 'selected' : ''} ${isFull ? 'disabled' : ''}`}
                        onClick={() => !isFull && toggleStarter(p)}
                      >
                        {p}
                      </span>
                    );
                  })}
              </div>
              {config.hasGoalkeeper && (
                <>
                  <div className="swap-section-label" style={{ marginTop: 10 }}>Starting goalkeeper</div>
                  <div className="starter-list">
                    {getGoalkeeperPlayers(config).map(p => {
                      const isStartingGk = config.startingGoalkeeper === p;
                      return (
                        <span
                          key={p}
                          className={`starter-chip gk-eligible ${isStartingGk ? 'selected' : ''}`}
                          onClick={() => setStartingGoalkeeper(p)}
                        >
                          <span className="gk-tag">GK</span>
                          {p}
                        </span>
                      );
                    })}
                  </div>
                </>
              )}
            </>
          )}
        </div>
      )}

      {validation.length > 0 && (
        <div className="help-note" style={{ borderLeftColor: 'var(--amber)', color: 'var(--amber)' }}>
          {validation.map((e, i) => <div key={i}>* {e}</div>)}
        </div>
      )}

      <button
        className="btn primary large full"
        onClick={onGenerate}
        disabled={validation.length > 0}
      >
        Generate Rotation ->
      </button>
    </div>
  );
}

  const stintLengthSec = config.stintLength * 60;
  const halftimeSec = (config.gameLength * 60) / 2;

  return (
    <div>
      <div className="section">
        <div className="section-title">Rotation Plan</div>
        <div className="help-note">
          {rotation.stints.length} stints of {fmtMinutes(config.stintLength)} min |
          {' '}{config.players.length} players |
          {' '}{config.numOnField} on field
          {config.hasGoalkeeper && <> | GK block: <strong>{config.goalkeeperBlockStints}</strong> stint{config.goalkeeperBlockStints === 1 ? '' : 's'}</>}
        </div>

        <div className="rot-table">
          {rotation.stints.map((s, i) => {
            const startSec = i * stintLengthSec;
            const endSec = (i + 1) * stintLengthSec;
            const isHalftime = Math.abs(endSec - halftimeSec) < 1;
            return (
              <div className="rot-stint" key={s.idx}>
                <div className="rot-stint-time">
                  <div className="rot-stint-num">STINT {i + 1}</div>
                  {fmtTime(startSec)}
                  <div style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 400 }}>
                    - {fmtTime(endSec)}{isHalftime && ' HT'}
                  </div>
                </div>
                <div className="rot-stint-content">
                  <div className="rot-onfield">
                    {config.hasGoalkeeper && s.goalkeeper && (
                      <span className="player-pill gk">{s.goalkeeper} <span style={{fontSize:9,opacity:0.7}}>GK</span></span>
                    )}
                    {s.onField.map(p => (
                      <span className="player-pill" key={p}>{p}</span>
                    ))}
                  </div>
                  {s.subOut.length > 0 && (
                    <div className="rot-subs">
                      <span className="out">OUT: {s.subOut.join(', ')}</span>
                      <span className="arrow">|</span>
                      <span className="in">IN: {s.subIn.join(', ')}</span>
                    </div>
                  )}
                  {i === 0 && <div className="rot-subs"><span style={{ color: 'var(--dim)' }}>Starting lineup</span></div>}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="totals">
        <div className="section-title" style={{ margin: 0 }}>Projected Minutes</div>
        <div className="totals-grid">
          {Object.entries(rotation.totalsByPlayer)
            .sort((a, b) => (b[1] + (rotation.goalkeeperTotals?.[b[0]] || 0)) - (a[1] + (rotation.goalkeeperTotals?.[a[0]] || 0)))
            .map(([name, n]) => (
              <div className="total-item" key={name}>
                <span className="name">{name}</span>
                <span className="mins">
                  {fmtMinutes(n * config.stintLength)}m
                  {rotation.goalkeeperTotals?.[name] ? ` | ${fmtMinutes(rotation.goalkeeperTotals[name] * config.stintLength)}m GK` : ''}
                </span>
              </div>
            ))}
        </div>
        <div className="totals-note">
          Each kid plays whole stints; total stints may differ by 1 if players don't divide evenly.
        </div>
      </div>

      <div className="btn-row" style={{ marginTop: 16 }}>
        <button className="btn ghost" onClick={onBack}>Edit</button>
        <button className="btn primary large" onClick={onStart}>Start Game</button>
      </div>
    </div>
  );
}

// Live game
function GameScreen({ config, initialRotation, initialLive, onExit }) {
  const stintLengthSec = config.stintLength * 60;
  const gameLengthSec = config.gameLength * 60;
  const halftimeSec = gameLengthSec / 2;

  const withGoalkeeperFallback = useCallback((baseRotation) => {
    if (!config.hasGoalkeeper || baseRotation.stints.every(s => s.goalkeeper)) return baseRotation;

    const schedule = getGoalkeeperSchedule(config, baseRotation.stints.length, baseRotation.stints[0]?.onField || []);
    return {
      ...baseRotation,
      goalkeeperTotals: schedule.reduce((totals, goalkeeper) => {
        if (goalkeeper) totals[goalkeeper] = (totals[goalkeeper] || 0) + 1;
        return totals;
      }, { ...(baseRotation.goalkeeperTotals || {}) }),
      stints: baseRotation.stints.map((s, i) => {
        const goalkeeper = s.goalkeeper || schedule[i] || null;
        const previousGoalkeeper = i > 0 ? (baseRotation.stints[i - 1]?.goalkeeper || schedule[i - 1] || null) : null;
        const restingGoalkeeper = previousGoalkeeper && previousGoalkeeper !== goalkeeper
          ? previousGoalkeeper
          : null;
        return {
          ...s,
          goalkeeper,
          onField: s.onField.filter(p => p !== goalkeeper && p !== restingGoalkeeper),
          offField: [
            ...s.offField.filter(p => p !== goalkeeper && p !== restingGoalkeeper),
            ...(restingGoalkeeper ? [restingGoalkeeper] : []),
          ],
        };
      }),
    };
  }, [config]);

  const [rotation, setRotation] = useState(() => initialLive?.rotation || withGoalkeeperFallback(initialRotation));

  const [running, setRunning] = useState(false);
  const [elapsedMs, setElapsedMs] = useState(initialLive?.elapsedMs || 0);
  const startTimestampRef = useRef(null);
  const accumulatedPausedMsRef = useRef(0);
  const pauseStartedAtRef = useRef(null);

  const chimerRef = useRef(null);
  const firedChimesRef = useRef(new Set());
  if (!chimerRef.current) chimerRef.current = makeChimer();

  const [banner, setBanner] = useState(null); // 'halftime' | 'fulltime' | null

  const wakeLockRef = useRef(null);
  const acquireWakeLock = useCallback(async () => {
    try {
      if ('wakeLock' in navigator) {
        wakeLockRef.current = await navigator.wakeLock.request('screen');
      }
    } catch (e) { /* ignore */ }
  }, []);
  const releaseWakeLock = useCallback(() => {
    try { wakeLockRef.current?.release(); } catch (e) {}
    wakeLockRef.current = null;
  }, []);
  useEffect(() => {
    const onVis = () => {
      if (document.visibilityState === 'visible' && running) acquireWakeLock();
    };
    document.addEventListener('visibilitychange', onVis);
    return () => document.removeEventListener('visibilitychange', onVis);
  }, [running, acquireWakeLock]);

  useEffect(() => {
    if (!running) return;
    const id = setInterval(() => {
      const now = Date.now();
      const elapsed = now - startTimestampRef.current - accumulatedPausedMsRef.current;
      setElapsedMs(Math.min(elapsed, gameLengthSec * 1000));
    }, 100);
    return () => clearInterval(id);
  }, [running, gameLengthSec]);

  const getFiredChimesThrough = (targetSec) => {
    const fired = new Set();
    const warnTime = halftimeSec - 60;
    if (warnTime > 0 && targetSec >= warnTime) fired.add('halftime-warning');
    if (targetSec >= halftimeSec) {
      fired.add('halftime');
      const stintBoundary = Math.round(halftimeSec / stintLengthSec) * stintLengthSec;
      if (Math.abs(stintBoundary - halftimeSec) < 0.5) {
        fired.add(`stint-end-${Math.round(halftimeSec / stintLengthSec)}`);
      }
    }
    for (let k = 1; k < rotation.stints.length; k++) {
      const t = k * stintLengthSec;
      if (targetSec >= t) fired.add(`stint-end-${k}`);
    }
    if (targetSec >= gameLengthSec) fired.add('fulltime');
    return fired;
  };

  const setGameTime = (nextMs, shouldPause = true) => {
    const clampedMs = Math.max(0, Math.min(nextMs, gameLengthSec * 1000));
    if (shouldPause) {
      setRunning(false);
      releaseWakeLock();
      startTimestampRef.current = null;
      accumulatedPausedMsRef.current = 0;
      pauseStartedAtRef.current = null;
    } else if (running) {
      startTimestampRef.current = Date.now() - clampedMs;
      accumulatedPausedMsRef.current = 0;
      pauseStartedAtRef.current = null;
    }
    setElapsedMs(clampedMs);
    firedChimesRef.current = getFiredChimesThrough(clampedMs / 1000);
    setBanner(null);
  };

  const handleScrub = (e) => {
    setGameTime(parseInt(e.target.value, 10) * 1000, true);
  };

  const adjustGameTime = (deltaSec) => {
    setGameTime(elapsedMs + deltaSec * 1000, true);
  };

  const jumpToStint = (delta) => {
    const targetIdx = Math.max(0, Math.min(rotation.stints.length - 1, currentStintIdx + delta));
    setGameTime(targetIdx * stintLengthSec * 1000, true);
  };

  const elapsedSec = elapsedMs / 1000;
  const isFullTime = elapsedSec >= gameLengthSec;
  const currentStintIdx = Math.min(
    rotation.stints.length - 1,
    Math.floor(elapsedSec / stintLengthSec)
  );
  const currentStint = rotation.stints[currentStintIdx];
  const stintElapsedSec = elapsedSec - currentStintIdx * stintLengthSec;
  const stintRemainSec = Math.max(0, stintLengthSec - stintElapsedSec);
  const nextStint = rotation.stints[currentStintIdx + 1] || null;
  const totalRemainSec = Math.max(0, gameLengthSec - elapsedSec);

  const [swapMode, setSwapMode] = useState(false);
  const [swapSelected, setSwapSelected] = useState(null); // { name, role }
  const [rosterOpen, setRosterOpen] = useState(false);
  const [newRosterName, setNewRosterName] = useState('');
  const [newRosterGkAllowed, setNewRosterGkAllowed] = useState(false);
  const [newRosterMode, setNewRosterMode] = useState('bench');
  const [extraPlayers, setExtraPlayers] = useState(initialLive?.extraPlayers || []); // added mid-game
  const [extraGoalkeepers, setExtraGoalkeepers] = useState(initialLive?.extraGoalkeepers || []);
  const [removedPlayers, setRemovedPlayers] = useState(new Set(initialLive?.removedPlayers || []));
  const [goalOpen, setGoalOpen] = useState(false);
  const [editingGoalId, setEditingGoalId] = useState(null);
  const [goalEvents, setGoalEvents] = useState(initialLive?.goalEvents || []);

  const saveLiveSnapshot = useCallback(() => {
    const hasLiveActivity = elapsedMs > 0 || extraPlayers.length > 0 || removedPlayers.size > 0 || goalEvents.length > 0;
    try {
      if (!hasLiveActivity) {
        localStorage.removeItem(LIVE_STORAGE_KEY);
        return;
      }
      localStorage.setItem(LIVE_STORAGE_KEY, JSON.stringify({
        config,
        rotation,
        elapsedMs,
        extraPlayers,
        extraGoalkeepers,
        removedPlayers: [...removedPlayers],
        goalEvents,
        savedAt: Date.now(),
      }));
    } catch (e) { /* ignore */ }
  }, [config, rotation, elapsedMs, extraPlayers, extraGoalkeepers, removedPlayers, goalEvents]);

  useEffect(() => {
    if (!running) return;
    const fired = firedChimesRef.current;
    const c = chimerRef.current;

    const warnTime = halftimeSec - 60;
    if (warnTime > 0 && elapsedSec >= warnTime && !fired.has('halftime-warning')) {
      fired.add('halftime-warning');
      c.halftimeWarning();
    }

    if (elapsedSec >= halftimeSec && !fired.has('halftime')) {
      fired.add('halftime');
      const stintBoundary = Math.round(halftimeSec / stintLengthSec) * stintLengthSec;
      if (Math.abs(stintBoundary - halftimeSec) < 0.5) fired.add(`stint-end-${Math.round(halftimeSec / stintLengthSec)}`);
      c.halftime();
      setBanner('halftime');
      setTimeout(() => setBanner(b => b === 'halftime' ? null : b), 4000);
    }

    for (let k = 1; k < rotation.stints.length; k++) {
      const t = k * stintLengthSec;
      const key = `stint-end-${k}`;
      if (elapsedSec >= t && !fired.has(key)) {
        fired.add(key);
        if (Math.abs(t - halftimeSec) > 0.5) c.stintEnd();
      }
    }

    if (elapsedSec >= gameLengthSec && !fired.has('fulltime')) {
      fired.add('fulltime');
      c.fullTime();
      setBanner('fulltime');
      setRunning(false);
      releaseWakeLock();
    }
  }, [elapsedSec, running, halftimeSec, gameLengthSec, stintLengthSec, rotation.stints.length, releaseWakeLock]);

  useEffect(() => {
    const id = setTimeout(() => {
      saveLiveSnapshot();
    }, 300);
    return () => clearTimeout(id);
  }, [saveLiveSnapshot]);

  const handleStart = () => {
    if (running) return;
    chimerRef.current.unlock();
    if (startTimestampRef.current === null) {
      startTimestampRef.current = Date.now() - elapsedMs;
      accumulatedPausedMsRef.current = 0;
    } else if (pauseStartedAtRef.current !== null) {
      accumulatedPausedMsRef.current += Date.now() - pauseStartedAtRef.current;
      pauseStartedAtRef.current = null;
    }
    setRunning(true);
    acquireWakeLock();
  };

  const handlePause = () => {
    if (!running) return;
    pauseStartedAtRef.current = Date.now();
    setRunning(false);
    releaseWakeLock();
  };

  const handleReset = () => {
    if (!confirm('Reset the clock to 0:00? Substitutions and roster changes will be kept.')) return;
    setGameTime(0, true);
  };

  const handleExit = () => {
    const hasGameProgress = elapsedSec > 0 || goalEvents.length > 0 || extraPlayers.length > 0 || removedPlayers.size > 0;
    if (hasGameProgress && !confirm('Go back to setup? This live game will be saved so you can resume it.')) return;
    saveLiveSnapshot();
    onExit();
  };

  const startSwap = () => {
    setSwapMode(true);
    setSwapSelected(null);
  };
  const cancelSwap = () => {
    setSwapMode(false);
    setSwapSelected(null);
  };
  const handleSwapTap = (name, role) => {
    if (!swapSelected) {
      setSwapSelected({ name, role });
      return;
    }
    if (swapSelected.name === name && swapSelected.role === role) {
      setSwapSelected(null);
      return;
    }
    if (swapSelected.role === role) {
      setSwapSelected({ name, role });
      return;
    }

    const picks = [swapSelected, { name, role }];
    const goalkeeperPick = picks.find(p => p.role === 'goalkeeper');
    const fieldPick = picks.find(p => p.role === 'field');
    const benchPick = picks.find(p => p.role === 'bench');
    let newOnField = [...currentStint.onField];
    let newOffField = [...currentStint.offField];
    const goalkeeperSchedule = rotation.stints.map(s => s.goalkeeper || null);

    if (goalkeeperPick) {
      const newGoalkeeper = fieldPick?.name || benchPick?.name;
      if (!newGoalkeeper) {
        setSwapSelected({ name, role });
        return;
      }
      const oldGoalkeeper = currentStint.goalkeeper;
      for (let i = currentStintIdx; i < goalkeeperSchedule.length; i++) {
        if (goalkeeperSchedule[i] !== oldGoalkeeper) break;
        goalkeeperSchedule[i] = newGoalkeeper;
      }
      if (fieldPick) {
        newOnField = currentStint.onField.map(p => p === fieldPick.name ? oldGoalkeeper : p).filter(Boolean);
        newOffField = currentStint.offField.filter(p => p !== newGoalkeeper && p !== oldGoalkeeper);
      } else {
        newOnField = currentStint.onField.filter(p => p !== newGoalkeeper && p !== oldGoalkeeper);
        newOffField = currentStint.offField.map(p => p === benchPick.name ? oldGoalkeeper : p).filter(Boolean);
      }
    } else {
      const onFieldName = fieldPick.name;
      const offFieldName = benchPick.name;
      newOnField = currentStint.onField.map(p => p === onFieldName ? offFieldName : p);
      newOffField = currentStint.offField.map(p => p === offFieldName ? onFieldName : p);
    }

    const newRotation = replanFromStint({
      rotation,
      fromIdx: currentStintIdx,
      newOnField,
      newOffField,
      K: config.hasGoalkeeper ? config.numOnField - 1 : config.numOnField,
      allRotationPlayers: [...getRotationPlayers(config), ...extraPlayers].filter(p => !removedPlayers.has(p)),
      goalkeeperSchedule,
      totalStints: rotation.stints.length,
    });
    setRotation(newRotation);
    setSwapMode(false);
    setSwapSelected(null);
  };

  const addRosterPlayer = () => {
    const trimmed = newRosterName.trim();
    if (!trimmed) return;
    const allCurrent = [...config.players, ...extraPlayers];
    if (allCurrent.some(p => p.toLowerCase() === trimmed.toLowerCase())) return;
    const nextExtraPlayers = [...extraPlayers, trimmed];
    const nextExtraGoalkeepers = newRosterGkAllowed ? [...extraGoalkeepers, trimmed] : extraGoalkeepers;
    setExtraPlayers(nextExtraPlayers);
    setExtraGoalkeepers(nextExtraGoalkeepers);

    const fieldK = config.hasGoalkeeper ? config.numOnField - 1 : config.numOnField;
    let newOnField = [...currentStint.onField];
    let newOffField = [...currentStint.offField, trimmed];
    if (newRosterMode === 'now' && fieldK > 0) {
      if (newOnField.length < fieldK) {
        newOnField = [...newOnField, trimmed];
        newOffField = newOffField.filter(p => p !== trimmed);
      } else if (newOnField.length > 0) {
        const restingNow = newOnField[0];
        newOnField = [trimmed, ...newOnField.slice(1)];
        newOffField = [restingNow, ...newOffField.filter(p => p !== trimmed)];
      }
    }
    const goalkeeperSchedule = newRosterGkAllowed
      ? rebuildGoalkeeperSchedule([...getRotationPlayers(config), ...nextExtraPlayers].filter(p => !removedPlayers.has(p)), null, nextExtraGoalkeepers)
      : rotation.stints.map(s => s.goalkeeper || null);
    const newRotation = replanFromStint({
      rotation,
      fromIdx: currentStintIdx,
      newOnField,
      newOffField,
      K: fieldK,
      allRotationPlayers: [...getRotationPlayers(config), ...nextExtraPlayers].filter(p => !removedPlayers.has(p)),
      goalkeeperSchedule,
      totalStints: rotation.stints.length,
    });
    setRotation(newRotation);
    setNewRosterName('');
    setNewRosterGkAllowed(false);
    setNewRosterMode('bench');
  };

  const rebuildGoalkeeperSchedule = (remainingPlayers, currentGoalkeeperOverride = null, goalkeeperOverride = extraGoalkeepers) => {
    const schedule = rotation.stints.map(s => s.goalkeeper || null);
    if (!config.hasGoalkeeper) return schedule;

    const eligibleKeepers = Array.from(new Set([...(config.goalkeeperNames || config.players), ...goalkeeperOverride]))
      .filter(p => remainingPlayers.includes(p));
    const currentGoalkeeper = currentGoalkeeperOverride || currentStint.goalkeeper;
    const keepers = currentGoalkeeper && remainingPlayers.includes(currentGoalkeeper)
      ? [currentGoalkeeper, ...eligibleKeepers.filter(p => p !== currentGoalkeeper)]
      : eligibleKeepers;

    if (keepers.length === 0) return schedule.map((gk, i) => i < currentStintIdx ? gk : null);

    const blockStints = Math.max(1, parseInt(config.goalkeeperBlockStints, 10) || 1);
    for (let i = currentStintIdx; i < schedule.length; i++) {
      schedule[i] = keepers[Math.floor((i - currentStintIdx) / blockStints) % keepers.length];
    }
    return schedule;
  };

  const removeRosterPlayer = (name) => {
    if (!confirm(`Remove ${name} from the rest of the game?`)) return;
    const newRemoved = new Set(removedPlayers);
    newRemoved.add(name);
    setRemovedPlayers(newRemoved);

    let newOnField = currentStint.onField.filter(p => p !== name);
    let newOffField = currentStint.offField.filter(p => p !== name);
    const remainingPlayers = [...getRotationPlayers(config), ...extraPlayers].filter(p => !newRemoved.has(p));
    let replacementGoalkeeper = null;

    if (config.hasGoalkeeper && currentStint.goalkeeper === name) {
      replacementGoalkeeper = newOffField.find(p => remainingPlayers.includes(p))
        || newOnField.find(p => remainingPlayers.includes(p))
        || null;
      if (!replacementGoalkeeper) {
        alert('No available player can replace the current goalkeeper.');
        newRemoved.delete(name);
        setRemovedPlayers(new Set(removedPlayers));
        return;
      }
      newOffField = newOffField.filter(p => p !== replacementGoalkeeper);
      if (newOnField.includes(replacementGoalkeeper)) {
        newOnField = newOnField.filter(p => p !== replacementGoalkeeper);
        if (newOffField.length > 0) {
          const filler = newOffField[0];
          newOnField = [...newOnField, filler];
          newOffField = newOffField.slice(1);
        }
      }
    }

    if (currentStint.onField.includes(name)) {
      if (newOffField.length > 0) {
        const filler = newOffField[0];
        newOnField = [...newOnField, filler];
        newOffField = newOffField.slice(1);
      }
    }
    const goalkeeperSchedule = rebuildGoalkeeperSchedule(remainingPlayers, replacementGoalkeeper);
    const newRotation = replanFromStint({
      rotation,
      fromIdx: currentStintIdx,
      newOnField,
      newOffField,
      K: Math.min(newOnField.length, config.hasGoalkeeper ? config.numOnField - 1 : config.numOnField),
      allRotationPlayers: remainingPlayers,
      goalkeeperSchedule,
      totalStints: rotation.stints.length,
    });
    setRotation(newRotation);
  };

  const liveTotals = useMemo(() => {
    const totals = {};
    const goalkeeperTotals = {};
    const allPlayers = [...getRotationPlayers(config), ...extraPlayers];
    allPlayers.forEach(p => {
      totals[p] = 0;
      goalkeeperTotals[p] = 0;
    });
    rotation.stints.forEach((s, i) => {
      const stintStartSec = i * stintLengthSec;
      const stintEndSec = (i + 1) * stintLengthSec;
      let cappedEnd = Math.min(stintEndSec, elapsedSec);
      if (cappedEnd > stintStartSec) {
        const playedSec = cappedEnd - stintStartSec;
        if (s.goalkeeper) goalkeeperTotals[s.goalkeeper] = (goalkeeperTotals[s.goalkeeper] || 0) + playedSec;
        s.onField.forEach(p => {
          totals[p] = (totals[p] || 0) + playedSec;
        });
      }
    });
    return { field: totals, goalkeeper: goalkeeperTotals };
  }, [rotation, elapsedSec, stintLengthSec, config, extraPlayers]);

  const currentScorers = useMemo(() => (
    Array.from(new Set([currentStint.goalkeeper, ...currentStint.onField].filter(Boolean)))
  ), [currentStint]);

  const goalPickerScorers = useMemo(() => {
    const editingGoal = goalEvents.find(goal => goal.id === editingGoalId);
    return Array.from(new Set([
      ...currentScorers,
      ...(editingGoal && editingGoal.team !== 'opponent' ? [editingGoal.scorer] : []),
    ]));
  }, [currentScorers, goalEvents, editingGoalId]);

  const goalSummary = useMemo(() => {
    const byPlayer = {};
    let opponent = 0;
    goalEvents.forEach(goal => {
      if (goal.team === 'opponent') {
        opponent++;
      } else {
        byPlayer[goal.scorer] = (byPlayer[goal.scorer] || 0) + 1;
      }
    });
    const us = Object.values(byPlayer).reduce((sum, n) => sum + n, 0);
    return { us, opponent, byPlayer };
  }, [goalEvents]);

  const recordGoal = (scorer) => {
    const isOpponent = scorer === 'Opponent';
    if (editingGoalId) {
      setGoalEvents(events => events.map(goal => (
        goal.id === editingGoalId
          ? { ...goal, scorer, team: isOpponent ? 'opponent' : 'us' }
          : goal
      )));
    } else {
      setGoalEvents(events => [
        ...events,
        {
          id: `${Date.now()}-${events.length}`,
          scorer,
          team: isOpponent ? 'opponent' : 'us',
          timeSec: elapsedSec,
          stintIdx: currentStintIdx,
        },
      ]);
    }
    setEditingGoalId(null);
    setGoalOpen(false);
  };

  const editGoal = (id) => {
    setEditingGoalId(id);
    setGoalOpen(true);
  };

  const deleteGoal = (id) => {
    if (!confirm('Delete this goal?')) return;
    setGoalEvents(events => events.filter(goal => goal.id !== id));
  };

  const clockClass = isFullTime ? 'paused' : (running ? 'running' : 'paused');
  const progressPct = Math.min(100, (elapsedSec / gameLengthSec) * 100);
  const halftimeIsPast = elapsedSec >= halftimeSec;

  let gameStatus = 'IN PROGRESS';
  let gameStatusClass = '';
  if (isFullTime) { gameStatus = 'FULL TIME'; gameStatusClass = 'fulltime'; }
  else if (halftimeIsPast) { gameStatus = '2ND HALF'; }
  else if (!running && elapsedSec === 0) { gameStatus = 'NOT STARTED'; gameStatusClass = 'paused'; }
  else if (!running) { gameStatus = 'PAUSED'; gameStatusClass = 'paused'; }
  else if (elapsedSec < halftimeSec) { gameStatus = '1ST HALF'; }

  return (
    <div className="game-screen">
      {banner && (
        <div
          className={`banner ${banner}`}
          onClick={() => setBanner(null)}
        >
          {banner === 'halftime' ? 'HALFTIME' : 'FULL TIME'}
        </div>
      )}

      <div className="clock-label">Game time</div>
      <div className={`clock-main ${clockClass}`}>{fmtTime(elapsedSec)}</div>
      <div className="progress-bar">
        <div className="fill" style={{ width: `${progressPct}%`, background: isFullTime ? 'var(--red)' : (halftimeIsPast ? 'var(--green)' : 'var(--green-2)') }} />
        <div className="halftime-tick" />
      </div>
      <div className="time-scrubber">
        <input
          type="range"
          min="0"
          max={Math.floor(gameLengthSec)}
          step="1"
          value={Math.min(Math.floor(elapsedSec), Math.floor(gameLengthSec))}
          onChange={handleScrub}
          aria-label="Scrub game time"
        />
        <div className="time-scrubber-labels">
          <span>0:00</span>
          <span>{fmtTime(gameLengthSec)}</span>
        </div>
        <div className="time-jumps">
          <button className="btn ghost" onClick={() => adjustGameTime(-10)}>-10s</button>
          <button className="btn ghost" onClick={() => adjustGameTime(10)}>+10s</button>
          <button className="btn ghost" onClick={() => jumpToStint(-1)}>Prev stint</button>
          <button className="btn ghost" onClick={() => jumpToStint(1)}>Next stint</button>
        </div>
      </div>
      <div className="clock-stint">
        <div><span className="label">Stint</span> <span className="val">{currentStintIdx + 1}/{rotation.stints.length}</span></div>
        <div><span className="label">Stint left</span> <span className="val">{fmtTime(stintRemainSec)}</span></div>
        <div><span className="label">Game left</span> <span className="val">{fmtTime(totalRemainSec)}</span></div>
      </div>
      <div className={`game-status ${gameStatusClass}`}>{gameStatus}</div>

      <div className="score-panel">
        <div className="score-team">
          <div className="label">Us</div>
          <div className="value">{goalSummary.us}</div>
        </div>
        <div className="score-divider">-</div>
        <div className="score-team" style={{ textAlign: 'right' }}>
          <div className="label">Opponent</div>
          <div className="value">{goalSummary.opponent}</div>
        </div>
      </div>

      {isFullTime && (
        <div className="summary-panel">
          <div className="section-title" style={{ margin: 0 }}>Post-game Summary</div>
          <div className="summary-score">
            <div>
              <div className="label">Us</div>
              <div className="value">{goalSummary.us}</div>
            </div>
            <div className="score-divider">-</div>
            <div style={{ textAlign: 'right' }}>
              <div className="label">Opponent</div>
              <div className="value">{goalSummary.opponent}</div>
            </div>
          </div>
          <div className="totals-grid">
            {Object.entries(liveTotals.field)
              .sort((a, b) => a[0].localeCompare(b[0]))
              .map(([name, sec]) => (
                <div className="total-item" key={name}>
                  <span className="name">{name}</span>
                  <span className="mins">
                    {Math.floor(sec / 60)}m {Math.floor(sec % 60)}s
                    {liveTotals.goalkeeper[name] ? ` | ${Math.floor(liveTotals.goalkeeper[name] / 60)}m ${Math.floor(liveTotals.goalkeeper[name] % 60)}s GK` : ''}
                    {goalSummary.byPlayer[name] ? ` | ${goalSummary.byPlayer[name]} goal${goalSummary.byPlayer[name] === 1 ? '' : 's'}` : ''}
                  </span>
                </div>
              ))}
          </div>
        </div>
      )}

      {/* On field now */}
      <div className="panel">
        <div className="panel-title">
          On field now
          {!swapMode && <span style={{ fontSize: 10, color: 'var(--dim)' }}>tap "Manual sub" to swap</span>}
        </div>
        {!swapMode ? (
          <div className="now-on">
            {config.hasGoalkeeper && currentStint.goalkeeper && (
              <span className="player-pill gk">{currentStint.goalkeeper} <span style={{fontSize:9,opacity:0.7}}>GK</span></span>
            )}
            {currentStint.onField.map(p => (
              <span className="player-pill" key={p}>{p}</span>
            ))}
          </div>
        ) : (
          <div>
            <div className="manual-instructions">
              Tap two players to swap field, bench, or goalkeeper roles. The rotation will replan.
            </div>
            {config.hasGoalkeeper && currentStint.goalkeeper && (
              <>
                <div className="swap-section-label">In goal</div>
                <div className="swap-list">
                  <span
                    className={`player-pill gk ${swapSelected?.name === currentStint.goalkeeper && swapSelected?.role === 'goalkeeper' ? 'selected' : ''}`}
                    onClick={() => handleSwapTap(currentStint.goalkeeper, 'goalkeeper')}
                  >
                    {currentStint.goalkeeper}
                  </span>
                </div>
              </>
            )}
            <div className="swap-section-label">On field</div>
            <div className="swap-list">
              {currentStint.onField.map(p => (
                <span
                  key={p}
                  className={`player-pill ${swapSelected?.name === p && swapSelected?.role === 'field' ? 'selected' : ''}`}
                  onClick={() => handleSwapTap(p, 'field')}

            </div>
            <div className="swap-section-label">On bench</div>
            <div className="swap-list">
              {currentStint.offField.length === 0 && <span style={{ color: 'var(--dim)', fontSize: 13 }}>No one on bench.</span>}
              {currentStint.offField.map(p => (
                <span
                  key={p}
                  className={`player-pill off ${swapSelected?.name === p && swapSelected?.role === 'bench' ? 'selected' : ''}`}
                  onClick={() => handleSwapTap(p, 'bench')}
                >{p}</span>
              ))}
            </div>
            <button className="btn ghost full" style={{ marginTop: 10 }} onClick={cancelSwap}>Cancel swap</button>
          </div>
        )}

        {/* Next sub */}
        {nextStint ? (
          <>
            <div className="panel-title" style={{ marginTop: 14 }}>
              Next sub
              <span className="countdown">in {fmtTime(stintRemainSec)}</span>
            </div>
            {nextStint.subOut.length > 0 ? (
              <div className="next-sub">
                {nextStint.goalkeeper && nextStint.goalkeeper !== currentStint.goalkeeper && (
                  <div className="sub-side in">
                    <div className="label">GK</div>
                    <div className="pills">
                      <span className="player-pill gk">{nextStint.goalkeeper}</span>

                  <div className="label">OUT</div>
                  <div className="pills">
                    {nextStint.subOut.map(p => <span key={p} className="player-pill off">{p}</span>)}

                <div className="sub-side in">
                  <div className="label">IN</div>
                  <div className="pills">

                  </div>
                </div>
              </div>
            ) : nextStint.goalkeeper && nextStint.goalkeeper !== currentStint.goalkeeper ? (
              <div className="next-sub">
                <div className="sub-side in">
                  <div className="label">GK</div>
                  <div className="pills">
                    <span className="player-pill gk">{nextStint.goalkeeper}</span>
                  </div>
                </div>
              </div>

              <div className="next-sub-empty">No subs at next stint</div>

          </>

          <div className="next-sub-empty" style={{ marginTop: 10 }}>Last stint - game ending</div>

      <button
        className="btn primary large full goal-button"
        onClick={() => { setEditingGoalId(null); setGoalOpen(true); }}
